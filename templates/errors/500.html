{% extends 'base.html' %}
{% block title %}Error del servidor{% endblock %}
{% block page_title %}Error 500{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div style="font-size:5rem;">⚠️</div>
  <h1 class="display-4 fw-bold text-danger">500</h1>
  <p class="lead">Ocurrió un error interno. El equipo técnico ha sido notificado.</p>
  <a href="{{ url_for('calendario.view_calendario') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house me-1"></i> Volver al Calendario
  </a>
</div>
{% endblock %}
