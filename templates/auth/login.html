{% extends 'base.html' %}

{% block title %}Iniciar Sesion - La Casa del Sr. Perez{% endblock %}

{% block auth_content %}
<div class="login-page">
  <div class="login-container">
    <div class="login-brand">
      <div class="login-logo">
        <img src="{{ url_for('static', filename='imagenes/logo.png') }}" alt="La Casa del Sr. Perez" style="width:80px;height:80px;object-fit:contain;">
      </div>
      <h2 class="login-title">La Casa del Sr. Perez</h2>
      <p class="login-subtitle">Sistema de Gestion Dental</p>
    </div>

    {% if error %}
    <div class="alert alert-danger" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="username" class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Tu usuario" required autofocus>
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contrasena</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Tu contrasena" required>
        </div>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="remember" name="remember">
        <label class="form-check-label" for="remember">Mantener sesion</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesion
      </button>
    </form>
  </div>
</div>
{% endblock %}
