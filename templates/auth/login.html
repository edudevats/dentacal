<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — La Casa del Sr. Pérez</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 420px; width: 100%; margin: auto; }
    .login-brand { font-size: 2rem; text-align: center; margin-bottom: 0.25rem; }
    .login-subtitle { text-align: center; color: #6c757d; margin-bottom: 1.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <div class="login-brand">🦷</div>
    <h4 class="text-center fw-bold mb-0">La Casa del Sr. Pérez</h4>
    <p class="login-subtitle">Sistema Recepcionista Virtual</p>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Iniciar Sesión</h5>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Usuario o Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="usuario o correo" required autofocus autocomplete="username">
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="••••••••" required autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">Mantener sesión iniciada</label>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-muted mt-3" style="font-size:0.8rem;">
      &copy; {{ 2026 }} La Casa del Sr. Pérez
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePwd').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });
</script>
</body>
</html>
