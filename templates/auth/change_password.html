{% extends 'base.html' %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block page_title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h5 class="mb-4"><i class="bi bi-key-fill me-2 text-primary"></i>Cambiar Contraseña</h5>

        <form method="POST" action="{{ url_for('auth.cambiar_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Contraseña actual</label>
            <input type="password" class="form-control" name="password_actual" required autocomplete="current-password">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Nueva contraseña</label>
            <input type="password" class="form-control" name="password_nueva" minlength="8" required autocomplete="new-password">
            <div class="form-text">Mínimo 8 caracteres.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar nueva contraseña</label>
            <input type="password" class="form-control" name="password_confirmar" minlength="8" required autocomplete="new-password">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i> Guardar
            </button>
            <a href="{{ url_for('calendario.view_calendario') }}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
