{% extends 'base.html' %}
{% block title %}Cambiar Contrasena{% endblock %}
{% block page_title %}Cambiar Contrasena{% endblock %}

{% block content %}
<div class="container-fluid p-4" style="max-width:500px">
  {% if success %}
  <div class="alert alert-success">
    <i class="bi bi-check-circle me-2"></i>Contrasena actualizada correctamente.
  </div>
  {% endif %}
  {% if error %}
  <div class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
  </div>
  {% endif %}

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Contrasena actual</label>
          <input type="password" name="password_actual" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nueva contrasena</label>
          <input type="password" name="password_nueva" class="form-control" required minlength="8">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar nueva contrasena</label>
          <input type="password" name="confirmar" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-key me-1"></i>Actualizar
        </button>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
