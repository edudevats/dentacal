<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — La Casa del Sr. Pérez</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; }
    .card-wrap { max-width: 420px; width: 100%; margin: auto; }
  </style>
</head>
<body>
<div class="container">
  <div class="card-wrap">
    <div class="text-center mb-3">
      <span style="font-size:2.5rem;">🦷</span>
      <h4 class="fw-bold mb-0">La Casa del Sr. Pérez</h4>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h5 class="mb-4"><i class="bi bi-key-fill me-2 text-primary"></i>Nueva contraseña</h5>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Nueva contraseña</label>
            <input type="password" class="form-control" name="password_nueva"
                   minlength="8" required placeholder="Mínimo 8 caracteres"
                   autocomplete="new-password">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar contraseña</label>
            <input type="password" class="form-control" name="password_confirmar"
                   minlength="8" required placeholder="Repite la contraseña"
                   autocomplete="new-password">
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check-circle me-1"></i> Guardar contraseña
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
